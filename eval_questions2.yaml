# --- Units and non-dimensionalisation ---

- question: "How do you create a physical quantity with units in Underworld3, and what module provides unit definitions?"
  reference: "Use `uw.scaling.units` (a Pint UnitRegistry): assign `u = uw.scaling.units`, then create quantities by multiplying — e.g. `100.0 * u.km` or `1e21 * u.Pa * u.s`. Geoscience shortcuts include `u.Ma` (million years) and `u.cm / u.year` for plate velocities."
  type: "rag-specific"

- question: "What functions does Underworld3 provide to convert between dimensional and non-dimensional quantities, and what must be set up first?"
  reference: "Call `uw.scaling.get_coefficients()` to get the scaling dict, then assign reference values (e.g. `scaling_coefficients[\"[length]\"] = KL_meters`). Use `uw.scaling.non_dimensionalise(quantity)` to get a dimensionless float and `uw.scaling.dimensionalise(value, units)` to convert back."
  type: "rag-specific"

# --- Multi-material / IndexSwarmVariable ---

- question: "What is IndexSwarmVariable in Underworld3 and how does it combine material properties from multiple materials?"
  reference: "IndexSwarmVariable assigns an integer material index (0, 1, 2, ...) to each particle and generates level-set functions φ_i(x) from particle positions. The composite constitutive flux is Σ φ_i(x) · f_i(x) — a weighted average over materials present in each element, with each material having its own constitutive model."
  type: "rag-specific"

- question: "In the Underworld3 SolCx multi-material benchmark, what viscosity ratio is used between the two materials and where is the material boundary located?"
  reference: "Material 0 has viscosity η=1, material 1 has viscosity η=10^6 — a ratio of 10^6. The material boundary sits at x=0.5. Free-slip BCs are applied on all boundaries and the body force is f_y = -cos(πx)sin(2πy)."
  type: "rag-specific"

# --- Spherical geometry operations ---

- question: "How do you access the radial unit vector in a SphericalShell mesh in Underworld3, and what is it used for?"
  reference: "The radial unit vector is `mesh.CoordinateSystem.unit_e_0` (alias: `mesh.X.unit_e_0`), pointing outward from the centre. It is used to express radial velocity boundary conditions — e.g., dotting velocity with unit_e_0 constrains only the radial component while leaving tangential components free."
  type: "rag-specific"

- question: "Why does a SphericalShell Stokes solve require nullspace rotation handling, and what rotations does UW3 define?"
  reference: "A closed incompressible spherical shell has three rigid-body rotation modes in the velocity nullspace, making the system singular. UW3 defines `_nullspace_rotations` as three sympy.Matrix vectors `[0,-z,y]`, `[z,0,-x]`, `[-y,x,0]` (rotations about x, y, z axes) which the Stokes solver projects out to obtain a unique solution."
  type: "rag-specific"

# --- Advection-diffusion solver ---

- question: "What does the theta parameter in Underworld3's SNES_AdvectionDiffusion solver control and what is its default?"
  reference: "theta controls time integration implicitness: 0 = explicit (forward Euler), 0.5 = Crank-Nicolson (default), 1 = fully implicit (backward Euler). The default theta=0.5 gives second-order time accuracy; theta=1.0 is unconditionally stable but first-order."
  type: "rag-specific"

# --- ParaView / visualisation output ---

- question: "What is the difference between write_timestep() and write_checkpoint() for visualisation in Underworld3?"
  reference: "write_timestep() projects field data to mesh vertices and generates XDMF files readable directly by ParaView; write_checkpoint() stores data at native polynomial degree for model restart, not vertex-centred. write_timestep() also calls _repack_tensor_to_paraview() to convert tensor fields to the Voigt notation ParaView expects."
  type: "rag-specific"

# --- ViscoElasticPlastic history variables ---

- question: "What parameter does ViscoElasticPlasticFlowModel require that ViscousFlowModel and ViscoPlasticFlowModel do not, and what happens if it is set to sympy.oo?"
  reference: "ViscoElasticPlasticFlowModel requires `shear_modulus` (G). Setting shear_modulus=sympy.oo removes elastic memory entirely, reducing the model to purely viscoplastic behaviour. The Maxwell relaxation time is t_relax = shear_viscosity_0 / shear_modulus."
  type: "rag-specific"

- question: "What do the BDF coefficients _bdf_c0 through _bdf_c3 in ViscoElasticPlasticFlowModel represent and what are their BDF-1 defaults?"
  reference: "These coefficients control temporal discretisation of the elastic stress update via Backward Differentiation Formula integration. BDF-1 defaults are _bdf_c0=1, _bdf_c1=-1, _bdf_c2=0, _bdf_c3=0. They are updated each timestep by the solver when using variable-timestep BDF-2."
  type: "rag-specific"
