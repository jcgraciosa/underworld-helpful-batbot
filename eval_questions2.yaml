# --- Swarm usage patterns ---

- question: "Can swarm.populate() be called more than once on the same swarm?"
  reference: "No — calling populate() on a swarm that already has particles raises RuntimeError: 'Cannot populate swarm that already has X particles.' Use add_particles_per_cell to add particles after initialization instead."
  type: "baseline"

- question: "What internal SwarmVariables does Underworld3 automatically create on every Swarm, and what are they used for?"
  reference: "_X0 is created on every Swarm (stores particle start-of-advection position, _proxy=False). _remeshed is only created when recycle_rate > 1 (default recycle_rate=0, so absent by default) — it tracks an integer cycle count for particle streak visualisation. Both are invisible to the user-facing API."
  type: "rag-specific"

# --- General FEM / guessable from conventions ---

- question: "What is the default polynomial degree for a MeshVariable created without specifying the degree parameter? How does this differ from solver-created variables?"
  reference: "MeshVariable defaults to degree=1. Stokes and Poisson solvers default to degree=2 for their primary unknowns. This mismatch can cause issues if users manually create a variable expecting it to match a solver's internal field."
  type: "baseline"

- question: "What preconditioner does the Underworld3 Stokes solver use by default, and what are its key settings?"
  reference: "The Stokes solver defaults to GAMG with aggregation: pc_type='gamg', pc_gamg_type='agg', pc_gamg_repartition=True, pc_mg_type='additive', pc_gamg_agg_nsmooths=2, mg_levels_ksp_max_it=3, ksp_type='gmres', snes_type='newtonls', snes_rtol=1e-4."
  type: "baseline"

- question: "What is the default value of p_continuous in the Stokes solver and what does setting it to False do?"
  reference: "p_continuous defaults to True (continuous P1 pressure elements). Setting it to False switches to discontinuous DG0 pressure, relevant for highly heterogeneous viscosity or physically expected pressure discontinuities."
  type: "baseline"

- question: "What is the default value of stokes.saddle_preconditioner and what does the property docstring say is recommended?"
  reference: "Defaults to None; PETSc uses its default mass matrix approximation. The docstring recommends setting it to 1/eta (inverse viscosity) for better preconditioning with heterogeneous viscosity, but this is not applied automatically."
  type: "baseline"

# --- In Claude training data (CLAUDE.md / public tutorials) ---

- question: "What is the modern way to access mesh vertex coordinates in Underworld3, and what is the deprecated approach?"
  reference: "Use mesh.X.coords for coordinate data. Both mesh.data and mesh.points are deprecated — they issue deprecation warnings and internally redirect to mesh.X.coords. The CLAUDE.md file explicitly flags this migration: 'mesh.data (coordinates) | Deprecated | mesh.X.coords'."
  type: "baseline"

- question: "In the thermal convection with units tutorial (Notebook 15), what is the functional form of the initial temperature perturbation?"
  reference: "init_t = T_outer + deltaT * (1 - r_prime) + 0.1 * deltaT * (sympy.sin(3 * th) * sympy.cos(sympy.pi * r_prime)), where r_prime = (r - inner_radius) / mantle_thickness. The perturbation amplitude is 0.1 times deltaT with mode numbers sin(3*theta)*cos(pi*r')."
  type: "baseline"

