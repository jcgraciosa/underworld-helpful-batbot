# --- Additional mesh type boundary names ---

- question: "What are the boundary label names for a QuarterAnnulus mesh in Underworld3, and how do they differ from the full Annulus mesh?"
  reference: "The QuarterAnnulus has four boundary labels: 'Lower' (inner arc, id=1), 'Upper' (outer arc, id=2), 'Left' (left radial edge, id=3), and 'Right' (right radial edge, id=4), plus 'Centre' (id=10) when radiusInner=0. This differs from the full Annulus mesh, which has only 'Lower' and 'Upper' — no Left or Right boundaries, since the full annulus is a closed ring with no radial edges."
  type: "rag-specific"

- question: "What are the boundary label names for a SphericalShell mesh in Underworld3, and what is the 'Centre' label used for?"
  reference: "SphericalShell defines three boundary labels: 'Lower' (inner spherical surface at r=r_inner, integer value 11), 'Upper' (outer spherical surface at r=r_outer, integer value 12), and 'Centre' (integer value 1), which labels the centre point and is only present when radiusInner=0 (a complete sphere rather than a shell with a hole at the centre)."
  type: "rag-specific"

# --- Debugging / error scenarios ---

- question: "In a ViscoPlasticFlowModel, what happens if you forget to set the yield_stress parameter before solving?"
  reference: "yield_stress defaults to sympy.oo (infinity), so min(η_0, τ_y/(2·ε̇_II)) always returns η_0 — the model behaves identically to ViscousFlowModel with no plastic yielding. No error is raised; it is a silent failure."
  type: "rag-specific"

- question: "What is strainrate_inv_II_min in ViscoPlasticFlowModel, what is its default, and what problem does it prevent?"
  reference: "strainrate_inv_II_min sets a floor on ε̇_II in the formula η_eff = min(η_0, τ_y/(2·ε̇_II)); default is 0. When ε̇_II → 0 in static regions, dividing by zero produces overflow or NaN. Setting it to a small positive value (e.g. 1e-18) prevents this."
  type: "rag-specific"

- question: "What does the _needs_function_rewire flag do in the Underworld3 Stokes solver, and what triggers it?"
  reference: "_needs_function_rewire is set to True when constitutive model parameters (e.g. viscosity expression) change, triggering a recompilation of the F1 residual and Jacobians on the next solve(). Changing only boundary condition values does not trigger a rewire."
  type: "rag-specific"


- question: "What does SNES DIVERGED_ITS mean in an Underworld3 Stokes solve, and what are the recommended approaches to address it?"
  reference: "SNES DIVERGED_ITS means the nonlinear solver hit its iteration limit. Common fixes: set stokes.saddle_preconditioner = 1/viscosity for large viscosity contrasts (>1e6); loosen stokes.tolerance; or improve initial conditions. Increasing snes_max_it is a last resort, not a fix."
  type: "rag-specific"

# --- Component interactions ---

- question: "After calling swarm.advection(), do proxy variables (MeshVariables projected from SwarmVariables) need to be explicitly updated?"
  reference: "Yes — proxy variables are not automatically updated after advection. UW3 tracks staleness via _proxy_stale; you must explicitly call the SwarmVariable's projection method after each advection step, otherwise the next Stokes solve uses stale material properties."
  type: "rag-specific"

- question: "In an Underworld3 thermal convection loop, what is the correct sequence of operations between a Stokes solve and swarm advection?"
  reference: "Standard sequence: (1) stokes.solve(), (2) adv_diff.solve(delta_t), (3) swarm.advection(stokes.u.sym, delta_t), (4) update proxy variables before the next Stokes solve. The Stokes solve must precede advection since advection uses the velocity field as input."
  type: "rag-specific"

# --- MPI gotchas ---

- question: "Which operations in Underworld3 are restricted to rank 0 only, and what happens if all ranks attempt them?"
  reference: "Rank-0-only operations: Gmsh mesh generation (gated by 'if uw.mpi.rank == 0'), XDMF generation via generateXdmf(), and metadata writes via uw.selective_ranks(0). All ranks attempting Gmsh simultaneously causes race conditions and corrupt mesh files; HDF5 writes are collective."
  type: "rag-specific"

- question: "In a parallel Underworld3 simulation, what happens to swarm particles that move outside a rank's local domain during advection, and how does this affect field evaluation?"
  reference: "Particles crossing rank boundaries are automatically migrated during advection. After migration, uw.function.evaluate() only works on locally owned particles; use uw.function.global_evaluate() to evaluate fields at arbitrary (potentially off-process) particle locations."
  type: "rag-specific"

# --- Checkpointing / output ---

- question: "What is the difference between mesh.write_checkpoint() and mesh.petsc_save_checkpoint() in Underworld3?"
  reference: "petsc_save_checkpoint() is a legacy wrapper around write_timestep(); write_checkpoint() is the recommended method. write_checkpoint() uses '{filename}.checkpoint.{index:05}.h5' naming, supports a meshUpdates flag to avoid rewriting identical mesh files, and accepts swarmVars."
  type: "rag-specific"

- question: "How does Underworld3 save SwarmVariable data in a checkpoint, and what limitation does this impose on restarts?"
  reference: "SwarmVariables are saved via their proxy MeshVariable (_meshVar), not as native particle data. If the proxy is stale after advection, stale data is checkpointed. On restart, the swarm must be repopulated and re-projected from the loaded proxy — individual particle positions are not preserved."
  type: "rag-specific"

- question: "What does the meshUpdates parameter in mesh.write_checkpoint() control, and when should you set it to False?"
  reference: "meshUpdates=True (default) saves the mesh as '{filename}.mesh.{index:05}.h5' every checkpoint; meshUpdates=False writes it once as '{filename}.mesh.0.h5' and only saves field data thereafter. Use False for Eulerian simulations where the mesh never deforms."
  type: "rag-specific"

# --- Viscosity model internals ---

- question: "In Underworld3's ViscousFlowModel, what does the .viscosity alias map to, and what is the default value of the underlying parameter?"
  reference: "viscosity is an alias for shear_viscosity_0 via the _ViscousParameterAlias mixin — both refer to the same parameter. The default is a symbolic UW3 symbol η=1 (model units), created by a lambda factory to ensure unique naming when multiple material models are used."
  type: "rag-specific"

- question: "What is the effective viscosity formula used in ViscoPlasticFlowModel, and how does UW3 implement the conditional min() operation symbolically?"
  reference: "The effective viscosity is η_eff = min(η_0, τ_y / (2·ε̇_II)), where ε̇_II = sqrt(trace(ε̇²)/2) is the second invariant of the strain rate tensor (symmetric part of ∇u). UW3 implements the min using sympy.Min() rather than a Python if/else, producing a smooth symbolic expression that can be differentiated for the Jacobian assembly. If yield_stress is sympy.oo (the default), sympy.Min() always returns η_0, giving purely viscous behaviour with no yield."
  type: "rag-specific"

