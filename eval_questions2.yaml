# --- Boundary condition syntax ---

- question: "In Underworld3, how do you apply a free-slip boundary condition on a vertical wall using add_dirichlet_bc, and what does None mean in the conditions list?"
  reference: "For a free-slip condition on a vertical wall (fix normal velocity, leave tangential free), pass None for the unconstrained component: stokes.add_dirichlet_bc([0.0, None], 'Left') constrains the x-component to zero and leaves the y-component free. None in the conds list tells UW3 to leave that vector component unconstrained. The boundary label must match exactly (case-sensitive). sympy.oo has the same effect as None. This syntax replaced the deprecated components= keyword parameter."
  type: "rag-specific"

- question: "What is add_natural_bc in Underworld3 and how does it differ from add_dirichlet_bc?"
  reference: "add_natural_bc applies a natural (Neumann-type) boundary condition, specifying a flux or traction rather than a solution value. For Stokes, this prescribes a surface traction; for advection-diffusion, a heat flux. add_dirichlet_bc (also aliased as add_essential_bc) constrains the solution value directly. A homogeneous Neumann BC (zero flux/traction) is the default when no condition is specified on a boundary, so add_natural_bc(0.0, boundary) is redundant but explicit. Natural BCs are incorporated into the weak form boundary integral, not by modifying the system matrix."
  type: "rag-specific"

# --- Build and workflow ---

- question: "What command must be run after modifying Underworld3 Cython source files, and what happens if you skip it?"
  reference: "You must run './uw build' (or equivalently 'pixi run build', which internally runs 'pip install . --no-build-isolation') after any source code changes. UW3 uses Cython for its core components which must be compiled before changes take effect — the installed package in site-packages will otherwise reflect stale code. Editable installs (pip install -e .) are explicitly not supported and break worktree isolation. Skipping the build means your Python session silently uses old compiled code with no error or warning."
  type: "rag-specific"

- question: "What are the pixi test commands in Underworld3 and how do they differ in scope?"
  reference: "'pixi run test' runs the quick level-1 test suite, taking approximately 2 minutes and covering basic functionality. 'pixi run test-all' runs the full test suite. The level distinction matters when iterating on changes — level-1 tests provide fast feedback while the full suite is needed before merging. Tests validate solver correctness and are part of the CI/CD pipeline."
  type: "rag-specific"

# --- SymPy and coordinate system ---

- question: "How do you access symbolic mesh coordinates in Underworld3 for use in SymPy expressions, and what does mesh.X return?"
  reference: "mesh.X is the CoordinateSystem object and the canonical way to access symbolic coordinate functions. 'x, y = mesh.X' unpacks symbolic BaseScalars for a 2D mesh (x, y, z for 3D), which can be used directly in SymPy expressions — e.g., eta = 1e21 * sympy.exp(-y) defines a depth-dependent viscosity. mesh.X.coords returns the numerical coordinate array (shape N × dim). mesh.CoordinateSystem is an alias for mesh.X. The deprecated mesh.data was the old way to access numerical coordinates."
  type: "rag-specific"

- question: "What does swarm_var.sym return in Underworld3 and how is it used in solver expressions?"
  reference: "swarm_var.sym returns the symbolic representation of the SwarmVariable's proxy MeshVariable — a SymPy expression usable anywhere a mesh-based field expression is expected. It is the standard way to pass particle-tracked material properties into a solver: stokes.constitutive_model.Parameters.shear_viscosity_0 = swarm_var.sym. When the solver evaluates this expression at quadrature points, it reads from the projected proxy MeshVariable. swarm_var.sym is only as current as the last proxy update — if the proxy is stale after advection, the solver uses outdated values."
  type: "rag-specific"

# --- Deprecated API ---

- question: "What is the correct replacement for the deprecated 'with mesh.access(var):' context manager pattern in Underworld3?"
  reference: "The 'with mesh.access(var):' and 'with swarm.access(var):' context managers are deprecated. The replacement is direct array access: 'var.data[...]' for reading and writing MeshVariable or SwarmVariable values. For example, 'with mesh.access(T): T.data[:] = 300' is replaced by 'T.data[:] = 300' directly. The context manager was a legacy pattern from Underworld2 that enforced access control; UW3 no longer requires it."
  type: "rag-specific"

# --- Tutorial content ---

- question: "Which Underworld3 beginner tutorial covers multi-material models using IndexSwarmVariable, and what is the benchmark problem used?"
  reference: "Tutorial 11 (11-Multi-Material_SolCx.ipynb) covers multi-material models using IndexSwarmVariable. The benchmark is SolCx — a manufactured solution for Stokes flow with a sharp viscosity discontinuity at x=0.5. IndexSwarmVariable assigns an integer material index to each particle, used to select material properties per particle via conditional SymPy expressions. SolCx has an analytic solution, making it suitable for convergence testing."
  type: "rag-specific"

# --- Projection ---

- question: "What interpolation method does Underworld3 use to project SwarmVariable data to its proxy MeshVariable, and what controls the number of particles used?"
  reference: "Underworld3 uses RBF (Radial Basis Function) interpolation via inverse-distance weighting to project SwarmVariable data onto the proxy MeshVariable. The number of nearest-neighbor particles used is controlled by the nnn parameter (default: mesh.dim + 1, i.e., 3 for 2D and 4 for 3D). The projection is performed via rbf_interpolate() or internally via _rbf_to_meshVar(). Too few particles (low nnn) produces noisy projections; too many increases cost and can over-smooth sharp material interfaces."
  type: "rag-specific"

# --- Checkpoint ---

- question: "In Underworld3, does write_checkpoint() call var._sync_lvec_to_gvec() automatically, or must the user call it manually before checkpointing?"
  reference: "write_checkpoint() calls var._sync_lvec_to_gvec() internally for each MeshVariable before writing to HDF5 — the user does not need to call it manually. This sync copies the rank-local vector to the global parallel-consistent vector required for collective HDF5 output. However, the user is responsible for ensuring the proxy MeshVariable has been updated (via SwarmVariable projection) before checkpointing, since write_checkpoint() saves the proxy data as-is without triggering a re-projection."
  type: "rag-specific"

# --- Swarm advection parameters ---

- question: "What does the corrector parameter in swarm.advection() do, and what is its default?"
  reference: "corrector defaults to False. When set to True, swarm.advection() uses a predictor-corrector scheme: it first takes a full Euler step (predictor) to estimate the new particle position, then averages the velocity at the original and predicted positions to compute a corrected displacement (corrector step). This improves accuracy from first-order to second-order in time for the particle trajectories, at the cost of two velocity evaluations per substep instead of one. The order=2 default (midpoint algorithm) already provides second-order accuracy without the corrector; corrector=True is an alternative second-order approach."
  type: "rag-specific"

- question: "What is the restore_points_to_domain_func parameter in swarm.advection(), and when would you use it?"
  reference: "restore_points_to_domain_func is an optional callback function that is called after each advection substep to reposition particles that have moved outside the mesh domain. It receives particle coordinates and should return corrected coordinates for any out-of-bounds particles. This is used for geometries with periodic or reflecting boundaries, or to enforce domain constraints such as keeping particles on a spherical shell surface after advection distorts their radial position. Without this callback, particles that exit the domain are lost or cause errors during the next field evaluation."
  type: "rag-specific"

# --- Additional Class B ---

- question: "What is the Boussinesq approximation in geodynamic modelling and what does it simplify?"
  reference: "The Boussinesq approximation assumes density variations are small enough that they can be neglected everywhere except in the buoyancy term of the momentum equation. This means the continuity equation reduces to div u = 0 (incompressible), eliminating acoustic waves and allowing a much larger timestep. Density appears only as ρ = ρ_0(1 - αT) in the buoyancy body force. The approximation is valid when density variations are much smaller than the reference density — appropriate for most mantle convection problems but not for compressible flow or very large pressure ranges."
  type: "baseline"

- question: "What is a preconditioner in the context of iterative linear solvers, and why is it needed?"
  reference: "A preconditioner is an operator P that transforms the linear system Ax = b into a better-conditioned equivalent (P^{-1}A)x = P^{-1}b, which iterative solvers can solve in fewer iterations. Without preconditioning, iterative Krylov methods converge slowly or not at all for ill-conditioned systems — the number of iterations grows with the condition number of A. A good preconditioner approximates A^{-1} cheaply. For Stokes systems in UW3, the default preconditioner combines GAMG for the velocity block and an inverse viscosity approximation for the pressure block, exploiting the block saddle point structure."
  type: "baseline"

