# --- Swarm constraint ordering ---

- question: "Do SwarmVariables need to be created before or after calling swarm.populate()?"
  reference: "SwarmVariables must be created BEFORE calling swarm.populate(). Once populate() is called, PETSc finalizes field registration via DMSwarmFinalizeFieldRegister() and no new variables can be added — attempting to do so raises a RuntimeError."
  type: "rag-specific"

# --- Hidden code comment contradictions ---

- question: "What smoothing value does SNES_AdvectionDiffusion apply to the SemiLagrangian_DDt operator by default, and what value is hardcoded for the internal flux tensor projection?"
  reference: "Default smoothing=0.0 for the SemiLagrangian psi tracking. The internal flux tensor (F) projection within the same solver hardcodes smoothing=0.0001. These two different smoothing values coexist in the same solver — the psi tracking uses no smoothing while the flux projection applies light regularisation."
  type: "rag-specific"

# --- Non-obvious parameter internals ---

- question: "What does the order parameter in SemiLagrangian_DDt control and what is its default?"
  reference: "order controls the number of history timesteps for BDF time integration; default is order=1 (first-order). Setting order=2 enables BDF-2, storing two previous timesteps for second-order accuracy — tutorials typically use order=2."
  type: "rag-specific"

# --- Non-obvious default behaviour ---

- question: "Does SNES_AdvectionDiffusion use particle-based (Lagrangian) or characteristics-based (semi-Lagrangian) advection by default?"
  reference: "Semi-Lagrangian by default — it creates a SemiLagrangian_DDt operator when no DuDt is provided. This tracks characteristics along the velocity field rather than discrete particles. To use Lagrangian particle advection instead, pass an explicit Lagrangian_DDt object."
  type: "rag-specific"

# --- Mesh-specific naming conventions ---

- question: "What are the boundary label names for an Annulus mesh in Underworld3?"
  reference: "The Annulus mesh uses 'Upper' for the outer boundary (outer radius) and 'Lower' for the inner boundary (inner radius). Example: adv_diff.add_dirichlet_bc(T_outer, 'Upper') and adv_diff.add_dirichlet_bc(T_inner, 'Lower')."
  type: "rag-specific"

# --- Hardcoded internal values ---

- question: "When you set stokes.tolerance = 1e-6, what PETSc solver parameters are actually configured and with what values?"
  reference: "Setting stokes.tolerance cascades to four PETSc parameters: snes_rtol=tol, ksp_atol=tol*1e-6, fieldsplit_pressure_ksp_rtol=tol*0.1, fieldsplit_velocity_ksp_rtol=tol*0.033, plus Eisenstat-Walker adaptive tolerance. These multiplier ratios are hardcoded and not visible from the property name."
  type: "rag-specific"

- question: "What smoothing value is hardcoded into the velocity projector inside the Darcy flow solver, and where is it set?"
  reference: "The Darcy solver hardcodes self._v_projector.smoothing = 1.0e-6 immediately after creating the projection solver in SNES_Darcy.__init__ (solvers.py). This value is not exposed as a configurable parameter of SNES_Darcy — users cannot change it without accessing the private _v_projector attribute directly."
  type: "rag-specific"

