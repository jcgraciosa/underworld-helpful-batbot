# --- PETSc concepts ---

- question: "What does SNES stand for in PETSc and what is it used for?"
  reference: "SNES stands for Scalable Nonlinear Equations Solvers. It is PETSc's framework for solving systems of nonlinear equations using Newton-like iteration. SNES manages the outer nonlinear loop, calling a KSP solver for each linear sub-problem at each Newton step. UW3 Stokes and advection-diffusion solvers are built on SNES."
  type: "baseline"

- question: "What does KSP stand for in PETSc and what types of methods does it cover?"
  reference: "KSP stands for Krylov SubSpace methods. It is PETSc's framework for solving linear systems using iterative Krylov methods such as GMRES, CG, MINRES, and BiCGStab. KSP is called at each SNES iteration to solve the linearised system. The choice of KSP type and its preconditioner (PC) significantly affects solver performance."
  type: "baseline"

- question: "What does DIVERGED_ITS mean as a PETSc KSP convergence reason, and how does it differ from SNES DIVERGED_ITS?"
  reference: "KSP DIVERGED_ITS means the linear solver reached its maximum iteration count without converging to the requested tolerance. Unlike SNES DIVERGED_ITS (nonlinear solver exceeded max iterations), KSP DIVERGED_ITS typically indicates the preconditioner is insufficient — the linear system is not being solved accurately enough per Newton step. Common fixes are improving the preconditioner, switching KSP type, or increasing ksp_max_it as a last resort."
  type: "baseline"

- question: "What is GAMG in PETSc and why is it effective for the velocity block in Stokes solves?"
  reference: "GAMG (Geometric Algebraic MultiGrid) is PETSc's algebraic multigrid preconditioner. It constructs a hierarchy of coarser representations automatically from the matrix structure, without requiring explicit geometric information. It is effective for elliptic problems like the momentum equation in Stokes flow because multigrid converges in a mesh-independent number of iterations. UW3 uses GAMG with aggregation (pc_gamg_type=agg) as its default preconditioner for the velocity block."
  type: "baseline"

- question: "What is a saddle point problem and why does incompressible Stokes flow produce one?"
  reference: "A saddle point problem is a linear system of the form [A B; B^T 0][u; p] = [f; g], where the system matrix is indefinite (has both positive and negative eigenvalues). Incompressible Stokes flow produces a saddle point system because the incompressibility constraint (div u = 0) acts as a Lagrange multiplier coupling velocity (A block) and pressure (B block), introducing a zero diagonal block. This structure requires specialised preconditioners such as block-diagonal or Schur complement approaches."
  type: "baseline"

- question: "What is the inf-sup condition (LBB condition) in mixed finite element methods, and why does it matter for Stokes flow?"
  reference: "The inf-sup (Ladyzhenskaya-Babuška-Brezzi, LBB) condition is a stability requirement for mixed finite element formulations. It states that the discrete pressure and velocity spaces must satisfy inf_q sup_v (div v, q) / (||v|| ||q||) ≥ β > 0 for a mesh-independent constant β. If violated, the discrete pressure develops spurious oscillations. Taylor-Hood elements (P2/P1 — degree-2 velocity, degree-1 pressure) satisfy the inf-sup condition, which is why UW3 defaults to degree=2 for Stokes solver variables."
  type: "baseline"

- question: "What is a fieldsplit preconditioner in PETSc and how is it applied to Stokes systems?"
  reference: "A fieldsplit preconditioner (pc_type=fieldsplit) decomposes a block system by field and applies separate sub-preconditioners to each block. For Stokes, it separates velocity and pressure, applying GAMG to the velocity block and a mass matrix approximation (inverse viscosity) to the pressure block. This exploits the saddle point structure. UW3's default Stokes preconditioner uses fieldsplit with an upper triangular factorisation of the blocks."
  type: "baseline"

# --- FEM concepts ---

- question: "What is the difference between a Dirichlet and a Neumann boundary condition in finite element analysis?"
  reference: "A Dirichlet (essential) boundary condition specifies the value of the solution on the boundary — e.g., temperature = 300 K or velocity = 0. It is imposed strongly by modifying the system matrix. A Neumann (natural) boundary condition specifies the flux or derivative normal to the boundary — e.g., zero heat flux or prescribed traction. In FEM, Neumann conditions arise naturally from the weak form boundary integral and do not require matrix modification. A homogeneous Neumann BC (zero flux) is the default when no condition is applied to a boundary."
  type: "baseline"

- question: "What is a Taylor-Hood element and why is it used for Stokes flow?"
  reference: "A Taylor-Hood element uses degree-2 (quadratic) basis functions for velocity and degree-1 (linear) basis functions for pressure on the same mesh. The polynomial degree difference ensures the inf-sup stability condition is satisfied for incompressible flow, preventing spurious pressure oscillations. It is the standard choice for stable Stokes discretisation. UW3 defaults to degree=2 for Stokes solver variables, consistent with the Taylor-Hood convention."
  type: "baseline"

- question: "What is the pressure nullspace in incompressible Stokes flow and how is it handled in practice?"
  reference: "In a closed-domain Stokes problem with no pressure Dirichlet boundary condition, pressure is determined only up to an additive constant — the constant pressure mode is in the nullspace of the operator, making the system singular. The nullspace is removed by either pinning the pressure at one node (a point Dirichlet BC), or by instructing the solver to project out the constant pressure mode. In UW3, setting nullspace=True on the Stokes solver instructs PETSc to handle this automatically."
  type: "baseline"

# --- Numerical methods ---

- question: "What is the CFL condition and why does it matter for advection problems?"
  reference: "The Courant-Friedrichs-Lewy (CFL) condition is a necessary stability criterion for explicit time integration of advection equations: CFL = u·Δt/Δx ≤ C_max, where u is velocity, Δt the timestep, Δx the mesh spacing, and C_max a scheme-dependent constant (typically 1 for first-order upwind). Violating the CFL condition causes the numerical solution to blow up. Semi-Lagrangian advection (used in UW3's SemiLagrangian_DDt) is unconditionally stable and not subject to a CFL restriction, which is one of its key advantages over explicit Eulerian advection."
  type: "baseline"

- question: "What is Newton's method in the context of nonlinear finite element problems?"
  reference: "Newton's method linearises a nonlinear residual F(u) = 0 by iteratively solving J(u_k) Δu = -F(u_k), where J is the Jacobian (tangent stiffness matrix), then updating u_{k+1} = u_k + Δu. It converges quadratically near the solution but requires forming and factoring the Jacobian at each iteration. In PETSc (SNES), Newton's method with line search (snes_type=newtonls) is the default nonlinear solver. For mildly nonlinear problems like viscous flow, it typically converges in a few iterations."
  type: "baseline"

- question: "What is GMRES and when is it preferred over Conjugate Gradient (CG) for linear systems?"
  reference: "GMRES (Generalised Minimal RESidual) is a Krylov iterative method for non-symmetric linear systems. It minimises the residual over the Krylov subspace at each step. CG requires the matrix to be symmetric positive definite; Stokes systems are neither, due to their saddle point structure. GMRES handles non-symmetric and indefinite systems, making it appropriate for Stokes solves. UW3 defaults to GMRES (ksp_type=gmres) for Stokes solves."
  type: "baseline"

- question: "What is Rayleigh-Bénard convection and what dimensionless number governs it?"
  reference: "Rayleigh-Bénard convection is thermally driven flow in a fluid layer heated from below and cooled from above. The governing dimensionless parameter is the Rayleigh number Ra = ρgαΔTd³/(ηκ), where ρ is density, g gravity, α thermal expansivity, ΔT the temperature difference, d layer depth, η viscosity, and κ thermal diffusivity. Convection onset occurs at Ra ≈ 1708 for a flat layer with rigid boundaries. It is a standard benchmark for coupled Stokes and advection-diffusion solvers in geodynamics and is demonstrated in UW3's Tutorial 15."
  type: "baseline"

- question: "What is the difference between Lagrangian and Eulerian descriptions of fluid flow in numerical geodynamics?"
  reference: "In a Lagrangian description, the computational grid or particles move with the fluid — each node tracks the same material point through time, naturally capturing material interfaces and history-dependent properties but requiring remeshing when the grid distorts. In an Eulerian description, the grid is fixed in space and fluid flows through it. UW3 uses a mixed approach: an Eulerian fixed mesh for the velocity-pressure Stokes solve, and Lagrangian particle swarms to track material properties and history variables such as accumulated strain or stress."
  type: "baseline"

