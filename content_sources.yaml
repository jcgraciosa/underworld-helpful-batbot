# Content Sources Configuration for HelpfulBatBot
#
# NOTE: This file documents what the bot indexes.
# The actual filtering is hardcoded in should_include_file() in HelpfulBat_app.py.
# content_manager.py reads this file but is not used by the main app.

content_sources:
  - name: "underworld3"
    type: "git"
    url: "https://github.com/underworldcode/underworld3.git"
    branch: "main"
    local_path: "./content_cache/underworld3"
    update_frequency: "daily"

    # Files indexed (mirrors default_includes in should_include_file())
    include_paths:
      # Beginner tutorials and docs
      - "docs/beginner/tutorials/*.ipynb"
      - "docs/beginner/tutorials/*.md"
      - "docs/beginner/*.md"

      # Advanced documentation (both top-level and subdirectories)
      - "docs/advanced/*.md"
      - "docs/advanced/**/*.md"
      - "docs/advanced/*.ipynb"
      - "docs/advanced/**/*.ipynb"

      # Top-level docs
      - "docs/*.md"
      - "README.md"
      - "CLAUDE.md"

      # Example scripts and notebooks
      - "examples/*.ipynb"
      - "examples/*.py"

      # A/B grade tests (user-facing examples)
      - "tests/test_0[0-6]*.py"

      # UW3 source: top-level and subdirectories
      - "src/underworld3/*.py"
      - "src/underworld3/**/*.py"

    # Files excluded (mirrors default_excludes in should_include_file())
    exclude_paths:
      - "src/petsc/**/*"
      - "src/cmake/**/*"
      - "docs/developer/**/*"
      - "docs/planning/**/*"
      - "planning/**/*"
      - "tests/test_[7-9]*.py"
      - "tests/test_1*.py"
      - ".git/**/*"
      - "**/__pycache__/**/*"
      - "build/**/*"
      - ".github/**/*"
      - ".ipynb_checkpoints/**/*"
      - ".pytest_cache/**/*"
      - ".quarto/**/*"
      - "_freeze/**/*"
      - "docs/.quarto/**/*"
      - "docs/_freeze/**/*"
      - "HelpfulBatBot/**/*"
      - "conda/**/*"
      - "publications/**/*"
      - "docs_legacy/**/*"
      - "**/output/**/*"

    priority: 1.0
    source_label: "Underworld3 Official Documentation"
